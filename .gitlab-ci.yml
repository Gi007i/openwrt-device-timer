# GitLab CI/CD pipeline for building OpenWRT APK packages
# Equivalent to .github/workflows/build-apk.yml

workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - if: $CI_COMMIT_BRANCH =~ /^release\//
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "schedule"

stages:
  - sync
  - prepare
  - build
  - release
  - pages

variables:
  SDK_VERSION: "25.12.0"
  SDK_TARGET: "bcm27xx-bcm2711"
  SDK_URL: "https://downloads.openwrt.org/releases/25.12.0/targets/bcm27xx/bcm2711/openwrt-sdk-25.12.0-bcm27xx-bcm2711_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
  PACKAGE_NAME: "luci-app-device-timer"

build:
  stage: build
  image: ubuntu:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
    - if: $CI_PIPELINE_SOURCE == "web"
  cache:
    key: openwrt-sdk-${SDK_VERSION}-${SDK_TARGET}-v3
    paths:
      - openwrt-sdk/
  before_script:
    - apt-get update
    - >-
      apt-get install -y build-essential clang flex bison g++ gawk
      gettext git libncurses-dev libssl-dev python3-setuptools rsync
      swig unzip zlib1g-dev file wget libelf-dev zstd
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        VERSION="${CI_COMMIT_TAG#v}"
      else
        VERSION="dev-$(git rev-parse --short HEAD)"
      fi
      echo "Building version: $VERSION"
    - |
      if [ ! -d "openwrt-sdk/staging_dir" ]; then
        echo "SDK not cached, downloading..."
        wget -q "$SDK_URL" -O /tmp/sdk.tar.zst
        mkdir -p openwrt-sdk
        tar --zstd -xf /tmp/sdk.tar.zst --strip-components=1 -C openwrt-sdk
        rm /tmp/sdk.tar.zst
      fi
    - |
      if [ ! -d "openwrt-sdk/feeds/luci" ]; then
        cd openwrt-sdk
        sed 's/^src-git-full /src-git /' feeds.conf.default \
          | sed 's|https://git.openwrt.org/feed/|https://github.com/openwrt/|' \
          | sed 's|https://git.openwrt.org/project/luci.git|https://github.com/openwrt/luci.git|' \
          > feeds.conf
        ./scripts/feeds update -a
        [ -d feeds/luci ] || { echo "ERROR: luci feed missing"; exit 1; }
        [ -d feeds/packages ] || { echo "ERROR: packages feed missing"; exit 1; }
        ./scripts/feeds install -a
        make defconfig
        make package/lua/compile V=s
        cd ..
      fi
    # Replace __PAGES_URL__ placeholder with actual Pages URL
    - sed -i "s|__PAGES_URL__|${CI_PAGES_URL}|g" src/$PACKAGE_NAME/Makefile
    - |
      rm -rf openwrt-sdk/package/$PACKAGE_NAME
      rm -rf openwrt-sdk/tmp
      cp -r src/$PACKAGE_NAME openwrt-sdk/package/
      cd openwrt-sdk
      make package/$PACKAGE_NAME/compile V=s
      cd ..
    - |
      mkdir -p artifacts
      find openwrt-sdk/bin/packages/ -name "*device-timer*.apk" -exec cp {} artifacts/ \;
      echo "Built packages:"
      ls -lh artifacts/
    # Generate signed package index
    - |
      APK="openwrt-sdk/staging_dir/host/bin/apk"
      cd artifacts
      if [ -n "$APK_SIGNING_KEY" ]; then
        printf '%s\n' "$APK_SIGNING_KEY" > /tmp/apk-key.pem
        chmod 600 /tmp/apk-key.pem
        ../$APK mkndx --allow-untrusted --sign /tmp/apk-key.pem -o packages.adb *.apk
        rm -f /tmp/apk-key.pem
        echo "--- Signed package index generated ---"
      else
        echo "WARNING: APK_SIGNING_KEY not set, creating unsigned index"
        ../$APK mkndx --allow-untrusted -o packages.adb *.apk
      fi
      ls -lh packages.adb
  artifacts:
    paths:
      - artifacts/
    expire_in: 30 days

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  needs:
    - job: build
      artifacts: false
  script:
    - |
      VERSION="${CI_COMMIT_TAG#v}"
      NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md)
      NOTES="${NOTES}

      **Full Changelog:** [CHANGELOG.md](${CI_PROJECT_URL}/-/blob/main/CHANGELOG.md)"
      echo "$NOTES" > release_notes.md
      cat release_notes.md
  release:
    tag_name: $CI_COMMIT_TAG
    name: "Release $CI_COMMIT_TAG"
    description: ./release_notes.md

pages:
  stage: pages
  image: ubuntu:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  needs:
    - job: build
      artifacts: true
  script:
    - mkdir -p public/packages public/keys
    - |
      cat > public/index.html << HTMLEOF
      <!DOCTYPE html>
      <html>
      <head><meta http-equiv="refresh" content="0;url=${CI_PROJECT_URL}"></head>
      <body></body>
      </html>
      HTMLEOF
    - cp artifacts/*.apk public/packages/
    - cp artifacts/packages.adb public/packages/
    # Copy public signing key
    - |
      KEY_DIR="src/${PACKAGE_NAME}/root/etc/apk/keys"
      if [ -d "$KEY_DIR" ]; then
        cp "$KEY_DIR"/* public/keys/
      fi
  artifacts:
    paths:
      - public

sync:
  stage: sync
  image:
    name: alpine/git:latest
    entrypoint: [""]
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - |
      git config user.name "gitlab-ci[bot]"
      git config user.email "gitlab-ci[bot]@users.noreply.gitlab.com"
      git remote set-url origin "https://oauth2:${RELEASE_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
      GITHUB_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/Gi007i/openwrt-device-timer.git"
      git remote add github "${GITHUB_URL}"
      git fetch origin main --tags
      git fetch github main --tags || { echo "WARNING: GitHub unreachable"; exit 0; }

      # Fast-forward main if behind (explicit origin to avoid ambiguity with github/main)
      git checkout -b main origin/main
      if git merge-base --is-ancestor HEAD github/main 2>/dev/null; then
        if [ "$(git rev-parse HEAD)" != "$(git rev-parse github/main)" ]; then
          git merge --ff-only github/main
          git push origin main
          echo "main synced from GitHub"
        else
          echo "main already up to date"
        fi
      else
        echo "ERROR: main branches have diverged, manual resolution needed"
        exit 1
      fi

      # Push missing tags (non-fatal: individual failures must not abort sync)
      GITLAB_TAGS=$(git ls-remote --tags origin | awk '{print $2}' | sed 's|refs/tags/||' | grep -v '\^{}' || true)
      for tag in $(git tag -l 'v*'); do
        if ! echo "$GITLAB_TAGS" | grep -qx "$tag"; then
          git push origin "$tag" && echo "Synced tag $tag" || echo "WARNING: Failed to push tag $tag"
        fi
      done
      echo "Sync complete"

prepare-release:
  stage: prepare
  image:
    name: alpine/git:latest
    entrypoint: [""]
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^release\//
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  script:
    - |
      # Extract version from branch name (release/v1.0.5 → 1.0.5)
      VERSION="${CI_COMMIT_BRANCH#release/v}"
      TAG="v${VERSION}"
      echo "Preparing release ${TAG}"
      echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "ERROR: Invalid version ${VERSION}"; exit 1; }
      # Configure git
      git config user.name "gitlab-ci[bot]"
      git config user.email "gitlab-ci[bot]@users.noreply.gitlab.com"
      git remote set-url origin "https://oauth2:${RELEASE_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git"
      # Squash-merge onto main
      git fetch origin main
      git checkout main
      git merge --squash "origin/${CI_COMMIT_BRANCH}"
      # Replace placeholders in README
      GITHUB_PAGES_URL="https://Gi007i.github.io/openwrt-device-timer"
      sed -i "s|__GITHUB_PAGES_URL__|${GITHUB_PAGES_URL}|g" README.md
      sed -i "s|__GITLAB_PAGES_URL__|${CI_PAGES_URL}|g" README.md
      sed -i "s|__VERSION__|${VERSION}|g" README.md
      # Set PKG_VERSION in Makefile
      sed -i "s|^PKG_VERSION:=.*|PKG_VERSION:=${VERSION}|" src/luci-app-device-timer/Makefile
      # Check DO_RELEASE flag
      DO_RELEASE=$(grep '^DO_RELEASE:=' src/luci-app-device-timer/Makefile | cut -d= -f2)
      git add -A
      if [ "${DO_RELEASE}" = "1" ]; then
        # Full release: commit, tag, push
        git commit -m "feat: release v${VERSION} device timer package"
        git tag "${TAG}"
        git push origin main
        git push origin "${TAG}"
        # Cross-push to GitHub
        git push "https://x-access-token:${GITHUB_TOKEN}@github.com/Gi007i/openwrt-device-timer.git" main || echo "WARNING: GitHub push (main) failed"
        git push "https://x-access-token:${GITHUB_TOKEN}@github.com/Gi007i/openwrt-device-timer.git" "${TAG}" || echo "WARNING: GitHub push (tag) failed"
      else
        # Merge only: no tag, no build
        git commit -m "feat: release v${VERSION} device timer package"
        git push origin main
        git push "https://x-access-token:${GITHUB_TOKEN}@github.com/Gi007i/openwrt-device-timer.git" main || echo "WARNING: GitHub push (main) failed"
      fi
      # Delete release branch
      git push origin --delete "${CI_COMMIT_BRANCH}" || true
