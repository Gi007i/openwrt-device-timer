name: Build APK and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  SDK_VERSION: "25.12.0"
  SDK_TARGET: "bcm27xx-bcm2711"
  SDK_URL: "https://downloads.openwrt.org/releases/25.12.0/targets/bcm27xx/bcm2711/openwrt-sdk-25.12.0-bcm27xx-bcm2711_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
  PACKAGE_NAME: "luci-app-device-timer"
  PAGES_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev-$(git rev-parse --short HEAD)"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gettext git libncurses-dev libssl-dev python3-setuptools rsync \
            swig unzip zlib1g-dev file wget libelf-dev zstd

      - name: Cache OpenWRT SDK
        uses: actions/cache@v4
        id: sdk-cache
        with:
          path: ~/openwrt-sdk
          key: openwrt-sdk-${{ env.SDK_VERSION }}-${{ env.SDK_TARGET }}-v3

      - name: Download and extract SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          wget -q "$SDK_URL" -O /tmp/sdk.tar.zst
          mkdir -p ~/openwrt-sdk
          tar --zstd -xf /tmp/sdk.tar.zst --strip-components=1 -C ~/openwrt-sdk
          rm /tmp/sdk.tar.zst

      - name: Setup SDK feeds
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          cd ~/openwrt-sdk

          # Use GitHub mirrors (git.openwrt.org is unreliable for large repos in CI)
          sed 's/^src-git-full /src-git /' feeds.conf.default \
            | sed 's|https://git.openwrt.org/feed/|https://github.com/openwrt/|' \
            | sed 's|https://git.openwrt.org/project/luci.git|https://github.com/openwrt/luci.git|' \
            > feeds.conf

          ./scripts/feeds update -a

          # Verify critical feeds were cloned
          [ -d feeds/luci ] || { echo "ERROR: luci feed missing"; exit 1; }
          [ -d feeds/packages ] || { echo "ERROR: packages feed missing"; exit 1; }

          ./scripts/feeds install -a
          make defconfig
          make package/lua/compile V=s

      - name: Replace __PAGES_URL__ placeholder
        run: sed -i "s|__PAGES_URL__|${PAGES_URL}|g" src/$PACKAGE_NAME/Makefile

      - name: Copy package and compile
        run: |
          rm -rf ~/openwrt-sdk/package/$PACKAGE_NAME
          rm -rf ~/openwrt-sdk/tmp
          cp -r src/$PACKAGE_NAME ~/openwrt-sdk/package/
          cd ~/openwrt-sdk
          make package/$PACKAGE_NAME/compile V=s

      - name: Collect APK artifacts
        run: |
          mkdir -p artifacts/keys
          find ~/openwrt-sdk/bin/packages/ -name "*device-timer*.apk" -exec cp {} artifacts/ \;
          # Include public signing key for feed deployment
          KEY_DIR="src/$PACKAGE_NAME/root/etc/apk/keys"
          if [ -d "$KEY_DIR" ]; then
            cp "$KEY_DIR"/* artifacts/keys/ 2>/dev/null || true
          fi
          echo "Built packages:"
          ls -lh artifacts/

      - name: Generate signed package index
        env:
          APK_SIGNING_KEY: ${{ secrets.APK_SIGNING_KEY }}
        run: |
          APK="$HOME/openwrt-sdk/staging_dir/host/bin/apk"
          cd artifacts
          if [ -n "$APK_SIGNING_KEY" ]; then
            printf '%s\n' "$APK_SIGNING_KEY" > /tmp/apk-key.pem
            chmod 600 /tmp/apk-key.pem
            $APK mkndx --allow-untrusted --sign /tmp/apk-key.pem -o packages.adb *.apk
            rm -f /tmp/apk-key.pem
            echo "--- Signed package index generated ---"
          else
            echo "WARNING: APK_SIGNING_KEY not set, creating unsigned index"
            $APK mkndx --allow-untrusted -o packages.adb *.apk
          fi
          ls -lh packages.adb

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-packages
          path: artifacts/
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract changelog for version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found" CHANGELOG.md)
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          NOTES="${NOTES}

          **Full Changelog:** [CHANGELOG.md](${REPO_URL}/blob/main/CHANGELOG.md)"
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}

  update-feed:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: apk-packages
          path: artifacts

      - name: Generate index.html redirect
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          cat > index.html << EOF
          <!DOCTYPE html>
          <html>
          <head><meta http-equiv="refresh" content="0;url=${REPO_URL}"></head>
          <body></body>
          </html>
          EOF

      - name: Update packages
        run: |
          mkdir -p packages keys
          rm -f packages/*device-timer*.apk packages/packages.adb
          cp artifacts/*.apk packages/
          cp artifacts/packages.adb packages/
          cp artifacts/keys/* keys/ 2>/dev/null || true
          echo "Updated packages:"
          ls -lh packages/

      - name: Commit and push to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/ keys/ index.html
          git commit -m "update feed: ${{ github.ref_name }}" || echo "No changes to commit"
          git push
