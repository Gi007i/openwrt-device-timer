name: Prepare Release

on:
  push:
    branches: ['release/**']

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#release/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Preparing release v${VERSION}"
          echo "${VERSION}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "ERROR: Invalid version ${VERSION}"; exit 1; }

      - name: Prepare release commit
        env:
          PAGES_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Squash-merge
          git checkout main
          git merge --squash "origin/${GITHUB_REF_NAME}"
          # Replace placeholders in README
          sed -i "s|__PAGES_URL__|${PAGES_URL}|g" README.md
          sed -i "s|__VERSION__|${VERSION}|g" README.md
          # Set PKG_VERSION in Makefile
          sed -i "s|^PKG_VERSION:=.*|PKG_VERSION:=${VERSION}|" src/luci-app-device-timer/Makefile
          # Commit, tag, push
          git add -A
          git commit -m "feat: release v${VERSION} device timer package"
          git tag "v${VERSION}"
          git push origin main
          git push origin "v${VERSION}"
          # Delete release branch
          git push origin --delete "${GITHUB_REF_NAME}" || true
